<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unchair</title>
    <!-- MediaPipe CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        #video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video,
        canvas {
            position: absolute;
            max-width: 100%;
            max-height: 100%;
            /* Mirror effect */
            transform: scaleX(-1);
        }

        #start-btn {
            position: absolute;
            z-index: 100;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.6);
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        #fps-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 50;
            font-family: monospace;
            font-size: 14px;
        }

        .fps-val {
            color: #00ff00;
            font-weight: bold;
        }

        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 50;
        }

        /* Hidden canvas for processing */
        #hidden-canvas {
            display: none;
        }

        #privacy-notice {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            z-index: 60;
            text-align: right;
            font-family: inherit;
            line-height: 1.4;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }

        #privacy-notice a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            pointer-events: auto;
        }

        #privacy-notice a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <button id="start-btn">Start</button>

    <div id="fps-overlay">
        Render FPS: <span id="render-fps" class="fps-val">0</span><br>
        Pose FPS: <span id="pose-fps" class="fps-val">0</span>
    </div>

    <div id="status">Waiting for a launch...</div>

    <div id="privacy-notice">
        <b>Privacy:</b> Video processed locally. No data stored.<br>
        Licensed under <a href="https://www.apache.org/licenses/LICENSE-2.0" target="_blank">Apache 2.0</a>
    </div>

    <div id="video-container">
        <video id="input-video" playsinline></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <!-- Hidden canvas for cropping and resizing -->
    <canvas id="hidden-canvas" width="192" height="192"></canvas>

    <script>
        const video = document.getElementById('input-video');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        const hiddenCtx = hiddenCanvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusEl = document.getElementById('status');
        const renderFpsEl = document.getElementById('render-fps');
        const poseFpsEl = document.getElementById('pose-fps');

        let pose;
        let isStarted = false;

        // FPS tracking
        let renderFrameCount = 0;
        let lastRenderFpsUpdate = 0;
        let lastPoseTime = 0;
        let poseFrameCount = 0;
        let lastPoseFpsUpdate = 0;

        async function initPose() {
            // Check for MediaPipe globals
            if (typeof Pose === 'undefined') {
                statusEl.textContent = 'Error. Mediapipe is not available!';
                return;
            }

            pose = new Pose({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
                }
            });

            pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            pose.onResults(onPoseResults);
        }

        function onPoseResults(results) {
            // Pose FPS calculation
            const now = performance.now();
            if (lastPoseTime > 0) {
                poseFrameCount++;
                if (now - lastPoseFpsUpdate > 1000) {
                    const fps = Math.round((poseFrameCount * 1000) / (now - lastPoseFpsUpdate));
                    poseFpsEl.textContent = fps;
                    poseFrameCount = 0;
                    lastPoseFpsUpdate = now;
                }
            }
            lastPoseTime = now;

            // Drawing skeleton
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.poseLandmarks) {
                // Since we processed a square crop, we need to map landmarks back
                // from [0, 1] relative to the square to [0, 1] relative to the whole video.
                const vWidth = video.videoWidth;
                const vHeight = video.videoHeight;
                const minDim = Math.min(vWidth, vHeight);
                const sx = (vWidth - minDim) / 2;
                const sy = (vHeight - minDim) / 2;

                const adjustedLandmarks = results.poseLandmarks.map(lm => ({
                    ...lm,
                    x: (lm.x * minDim + sx) / vWidth,
                    y: (lm.y * minDim + sy) / vHeight
                }));

                const mpPose = window.Pose || {};
                const mpDraw = window;

                const connectors = window.POSE_CONNECTIONS || mpPose.POSE_CONNECTIONS;
                const drawConn = mpDraw.drawConnectors;
                const drawLand = mpDraw.drawLandmarks;

                if (drawConn && connectors) {
                    drawConn(ctx, adjustedLandmarks, connectors,
                        { color: '#00FF00', lineWidth: 4 });
                }
                if (drawLand) {
                    drawLand(ctx, adjustedLandmarks,
                        { color: '#FF0000', lineWidth: 2, radius: 4 });
                }
            }
            ctx.restore();
        }

        async function processFrame() {
            if (!isStarted) return;

            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;

            if (vWidth === 0 || vHeight === 0) {
                console.warn('Video dimensions not ready yet');
                requestAnimationFrame(processFrame);
                return;
            }

            // Crop and resize for MediaPipe
            const minDim = Math.min(vWidth, vHeight);
            const sx = (vWidth - minDim) / 2;
            const sy = (vHeight - minDim) / 2;

            // Draw to hidden canvas for optimization (192x192)
            hiddenCtx.drawImage(video, sx, sy, minDim, minDim, 0, 0, 192, 192);

            // Send to MediaPipe
            try {
                await pose.send({ image: hiddenCanvas });
            } catch (err) {
                console.error('Error sending frame to Pose:', err);
            }

            requestAnimationFrame(processFrame);
        }

        function renderLoop(now) {
            if (isStarted) {
                // Render FPS calculation
                renderFrameCount++;
                if (now - lastRenderFpsUpdate > 1000) {
                    const fps = Math.round((renderFrameCount * 1000) / (now - lastRenderFpsUpdate));
                    renderFpsEl.textContent = fps;
                    renderFrameCount = 0;
                    lastRenderFpsUpdate = now;
                }
            }
            requestAnimationFrame(renderLoop);
        }

        async function start() {
            startBtn.style.display = 'none';
            statusEl.textContent = 'Camera initialization...';

            try {
                let stream;
                try {
                    // Try with ideal constraints first
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'user',
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    });
                } catch (e) {
                    console.warn('Ideal constraints failed, falling back to basic video', e);
                    // Fallback to basic video
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                }

                video.srcObject = stream;
                await video.play();

                // Wait for video dimensions
                const updateSize = () => {
                    const vWidth = video.videoWidth;
                    const vHeight = video.videoHeight;

                    // Match canvas to video aspect ratio and scale to fit window
                    const winWidth = window.innerWidth;
                    const winHeight = window.innerHeight;
                    const videoAspect = vWidth / vHeight;
                    const winAspect = winWidth / winHeight;

                    let targetWidth, targetHeight;
                    if (winAspect > videoAspect) {
                        targetHeight = winHeight * 0.9;
                        targetWidth = targetHeight * videoAspect;
                    } else {
                        targetWidth = winWidth * 0.9;
                        targetHeight = targetWidth / videoAspect;
                    }

                    canvas.width = vWidth;
                    canvas.height = vHeight;
                    video.width = vWidth;
                    video.height = vHeight;

                    canvas.style.width = `${targetWidth}px`;
                    canvas.style.height = `${targetHeight}px`;
                    video.style.width = `${targetWidth}px`;
                    video.style.height = `${targetHeight}px`;
                };

                window.addEventListener('resize', updateSize);
                updateSize();

                statusEl.textContent = 'Model is loading..';
                await initPose();

                isStarted = true;
                statusEl.textContent = 'Works well :)';

                processFrame();
            } catch (err) {
                console.error('Camera Error:', err);
                let errorMsg = err.message;
                if (err.name === 'NotAllowedError') {
                    errorMsg = 'Access denied! Click the camera icon in your address bar and reset permissions, then refresh the page.';
                } else if (err.name === 'NotFoundError') {
                    errorMsg = 'No camera device found. Please connect a webcam.';
                } else if (err.name === 'NotReadableError') {
                    errorMsg = 'Camera is currently in use by another app!';
                }

                statusEl.innerHTML = `<span style="color: #ff4444; font-weight: bold;">Error: ${err.name}</span><br><small style="color: #fff;">${errorMsg}</small>`;
                startBtn.style.display = 'block';
                startBtn.textContent = 'Retry Camera Access';
            }
        }

        startBtn.addEventListener('click', start);
        requestAnimationFrame(renderLoop);

    </script>
</body>

</html>
