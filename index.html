<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unchairted - Stop Sitting</title>

    <!-- SEO & Social Meta Tags -->
    <meta name="description"
        content="Stop sitting all day! Unchairted uses your webcam to help you move. It's private and works in your browser.">
    <meta property="og:title" content="Unchairted: Get Up and Move!">
    <meta property="og:description" content="Your camera + Your body = A better break. No data saved, just moves ⚡">
    <meta property="og:image" content="./assets/logo.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Favicon (Emoji based) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪑</text></svg>">

    <!-- MediaPipe CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="menu-container">
        <h1>Select Game</h1>
        <div id="game-selection">
            <button id="start-btn" class="mode-btn">
                <span class="mode-icon">🧼</span>
                Bubble Hunter
            </button>
            <button id="egg-btn" class="mode-btn disabled">
                <span class="mode-icon">🥚</span>
                Egg Catcher
                <small>(Soon)</small>
            </button>
        </div>
    </div>

    <div id="fps-overlay">
        Render FPS: <span id="render-fps" class="fps-val">0</span><br>
        Pose FPS: <span id="pose-fps" class="fps-val">0</span>
    </div>

    <div id="status">Waiting for a launch...</div>

    <div id="countdown" class="hidden"></div>
    <div id="score-container" class="hidden">
        Score: <span id="score-val">0</span>
    </div>

    <footer>
        <div class="footer-row row-1">
            <div class="footer-item">
                <span style="color: rgba(255,255,255,0.7)">🔒 Privacy:</span>
                <span> Processing is local. No tracking/cookies.</span>
            </div>
            <div class="footer-item">
                <a href="https://www.apache.org/licenses/LICENSE-2.0" target="_blank">
                    Apache 2.0<span class="hide-mobile"> License</span>
                </a>
            </div>
        </div>

        <div class="footer-row secondary-info row-2">
            <div class="footer-item">
                <span>Copyright© Vitalii • Unchairted 2026</span>
            </div>
            <div class="footer-item">
                <img src="https://api.visitorbadge.io/api/VisitorHit?user=chairy&repo=mairy&countColor=%237B1E7A"
                    alt="Visitors" class="badge-img">
            </div>
        </div>
    </footer>

    <div id="video-container">
        <video id="input-video" playsinline></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <!-- Hidden canvas for cropping and resizing -->
    <canvas id="hidden-canvas" width="192" height="192"></canvas>

    <script type="module" src="js/main.js"></script>
</body>

</html>


</html>
